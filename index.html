
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>Marryzen ... A platform for serious marriage</title>
    <meta name="description" content="Marryzen is a private, values-based platform for people seeking serious, long-term marriage. Verified profiles, marriage-intent only ... no casual dating." />
    <meta name="theme-color" content="#E6B450" />

    <!-- ============================================================ -->
    <!-- B13 - Termly CMP. autoBlock=on prevents Meta/GA4/TikTok       -->
    <!-- pixels from firing before consent is given.                  -->
    <!--                                                              -->
    <!-- Bundle Z (2026-06-15) — added async attribute so the Termly  -->
    <!-- resource-blocker downloads in parallel with HTML parsing      -->
    <!-- instead of blocking it. autoBlock=on patches                  -->
    <!-- document.createElement / appendChild proxies once the script  -->
    <!-- runs; in our app no marketing pixels are injected from        -->
    <!-- index.html (they're added post-hydration by the React tree),  -->
    <!-- so the small async-execution gap does not race the first      -->
    <!-- pixel injection. NOTE: do not add `defer` here — Termly's     -->
    <!-- docs recommend ASAP execution, defer pushes execution to      -->
    <!-- after DOMContentLoaded which widens the at-risk window if     -->
    <!-- any pixel is ever inlined into index.html in the future.      -->
    <!-- ============================================================ -->
    <script async src="https://app.termly.io/resource-blocker/04874b92-554a-4fee-9d8f-2becf5ed2d06?autoBlock=on"></script>

    <link rel="canonical" href="https://www.marryzen.com/" />

    <!-- ============================================================ -->
    <!-- PWA — Add to Home Screen capability (2026-06-23)              -->
    <!-- Manifest: full app metadata (name, icons, theme, start_url).  -->
    <!-- Apple meta tags: iOS Safari ignores manifest for some props,  -->
    <!-- needs these legacy meta names to render correctly when a user -->
    <!-- adds Marryzen to the iOS home screen.                         -->
    <!-- ============================================================ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="application-name" content="Marryzen" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Marryzen" />

    <!-- Favicon + iOS home screen icon. apple-touch-icon.png is the   -->
    <!-- PWA-spec PNG that iOS picks up; the SVG favicon stays for     -->
    <!-- modern browsers that prefer vector.                           -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph (Phase 38: og-image.jpg -> og-image.png, file now exists in /public) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Marryzen" />
    <meta property="og:url" content="https://www.marryzen.com/" />
    <meta property="og:title" content="Marryzen - A platform for serious marriage" />
    <meta property="og:description" content="A private, values-based platform for serious, long-term marriage. Verified profiles, marriage-intent only." />
    <meta property="og:image" content="https://www.marryzen.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://www.marryzen.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Marryzen — Marriage-intent. Faith-first. Verified." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.marryzen.com/" />
    <meta name="twitter:title" content="Marryzen - A platform for serious marriage" />
    <meta name="twitter:description" content="A private, values-based platform for serious, long-term marriage. Verified profiles, marriage-intent only." />
    <meta name="twitter:image" content="https://www.marryzen.com/og-image.png" />
    <meta name="twitter:image:alt" content="Marryzen — Marriage-intent. Faith-first. Verified." />

    <!-- reCAPTCHA v3 will be loaded dynamically -->

    <!-- ============================================================ -->
    <!-- Termly cookie banner — Marryzen brand v5 (compact, on-brand) -->
    <!-- Cream surface matches marryzen.com page bg; gold Accept       -->
    <!-- matches hero CTA; ~30% smaller footprint than v4.             -->
    <!-- ============================================================ -->
    <style>
/* ============================================================
 * Termly cookie banner — Marryzen brand v5 (2026-06-23)
 *
 * Combines v3's color richness with v4's readability,
 * compacted ~30% to feel less obtrusive. Surface matches
 * marryzen.com's actual page bg (#FAF7F2 cream). Primary
 * CTA = gold (matches the site's hero button pattern).
 *
 * Palette: cream #FAF7F2 (surface), dark #1F1F1F (text),
 *          warm muted #5F5A56 (body), gold #E6B450 (primary),
 *          gold-hover #D0A23D (active).
 * ============================================================ */

/* ---------- Banner card — compact, cream, soft border ---------- */
[class*="termly-styles-module-root-"],
[class*="termly-styles-module-content-"],
[class*="termly-styles-module-shadowBox-"] {
  background: #FAF7F2 !important;
  color: #1F1F1F !important;
  border: 1px solid rgba(230, 180, 80, 0.35) !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 28px rgba(31, 31, 31, 0.12), 0 2px 6px rgba(31, 31, 31, 0.06) !important;
  font-family: inherit !important;
  padding: 16px 20px !important;
  max-width: 980px !important;
  margin: 0 auto !important;
}

/* ---------- Title — smaller, brand-warm ---------- */
[class*="termly-styles-module-title-"] {
  color: #1F1F1F !important;
  font-size: 1rem !important;
  font-weight: 700 !important;
  letter-spacing: -0.01em !important;
  margin: 0 0 6px 0 !important;
}

/* ---------- Body text — compact, warm muted ---------- */
[class*="termly-styles-message-"],
[class*="termly-styles-module-content-"] p,
[class*="termly-styles-module-content-"] li {
  color: #5F5A56 !important;
  font-size: 0.875rem !important;
  line-height: 1.5 !important;
  margin: 0 !important;
}

/* ---------- Links — brand gold underlined ---------- */
[class*="termly-styles-link-"],
[class*="termly-styles-module-content-"] a {
  color: #1F1F1F !important;
  text-decoration: underline !important;
  text-decoration-color: #E6B450 !important;
  text-decoration-thickness: 1.5px !important;
  text-underline-offset: 2px !important;
  font-weight: 500 !important;
  transition: color .15s ease !important;
}
[class*="termly-styles-link-"]:hover,
[class*="termly-styles-module-content-"] a:hover {
  color: #E6B450 !important;
}

/* ---------- Buttons container — tighter spacing ---------- */
[class*="termly-styles-module-buttons-"] {
  gap: 8px !important;
  margin-top: 12px !important;
  display: flex !important;
  flex-wrap: wrap !important;
  align-items: center !important;
}

/* ---------- Button base — compact ---------- */
[class*="termly-styles-module-acceptButton-"],
[class*="termly-styles-module-prefsButton-"],
[class*="termly-styles-module-solid-"],
[class*="termly-styles-module-outline-"] {
  font-family: inherit !important;
  font-size: 0.875rem !important;
  font-weight: 600 !important;
  letter-spacing: -0.005em !important;
  border-radius: 8px !important;
  padding: 9px 18px !important;
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease, color .15s ease !important;
  cursor: pointer !important;
  white-space: nowrap !important;
  line-height: 1.2 !important;
}

/* ---------- Primary CTA: Accept All ---------- gold pill (matches hero CTA on the site) */
[class*="termly-styles-module-acceptButton-"],
[class*="termly-styles-module-solid-"][class*="termly-styles-module-primary-"] {
  background: #E6B450 !important;
  color: #1F1F1F !important;
  border: 1px solid #E6B450 !important;
  font-weight: 700 !important;
}
[class*="termly-styles-module-acceptButton-"]:hover,
[class*="termly-styles-module-solid-"][class*="termly-styles-module-primary-"]:hover {
  background: #D0A23D !important;
  border-color: #D0A23D !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 6px 16px rgba(230, 180, 80, 0.32) !important;
}
[class*="termly-styles-module-acceptButton-"]:active,
[class*="termly-styles-module-solid-"][class*="termly-styles-module-primary-"]:active {
  transform: translateY(0) !important;
  box-shadow: 0 2px 4px rgba(230, 180, 80, 0.2) !important;
}

/* ---------- Secondary: Decline / non-primary solid ---------- outlined dark (quieter than primary) */
[class*="termly-styles-module-solid-"]:not([class*="termly-styles-module-primary-"]) {
  background: #FFFFFF !important;
  color: #1F1F1F !important;
  border: 1px solid #1F1F1F !important;
  font-weight: 600 !important;
}
[class*="termly-styles-module-solid-"]:not([class*="termly-styles-module-primary-"]):hover {
  background: #1F1F1F !important;
  color: #FAF7F2 !important;
  border-color: #1F1F1F !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 6px 16px rgba(31, 31, 31, 0.18) !important;
}

/* ---------- Tertiary: Preferences ---------- text-style, quiet */
[class*="termly-styles-module-prefsButton-"],
[class*="termly-styles-module-outline-"] {
  background: transparent !important;
  color: #5F5A56 !important;
  border: 1px solid transparent !important;
  font-weight: 500 !important;
  text-decoration: underline !important;
  text-decoration-color: rgba(95, 90, 86, 0.4) !important;
  text-underline-offset: 3px !important;
  padding: 9px 12px !important;
}
[class*="termly-styles-module-prefsButton-"]:hover,
[class*="termly-styles-module-outline-"]:hover {
  background: transparent !important;
  color: #1F1F1F !important;
  text-decoration-color: #E6B450 !important;
  border-color: transparent !important;
}

/* ---------- Close X ---------- subtle */
[class*="termly-styles-closeButton-"] {
  color: #5F5A56 !important;
  background: transparent !important;
  border: none !important;
  font-size: 1.2rem !important;
  width: 28px !important;
  height: 28px !important;
  border-radius: 6px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  cursor: pointer !important;
  opacity: 0.6 !important;
  transition: all .15s ease !important;
}
[class*="termly-styles-closeButton-"]:hover {
  color: #1F1F1F !important;
  background: rgba(31, 31, 31, 0.05) !important;
  opacity: 1 !important;
}

/* ---------- Preference modal — checkbox + checked states ---------- */
[class*="termly-styles-module-checkbox-"] {
  border: 1.5px solid rgba(31, 31, 31, 0.3) !important;
  background: #FFFFFF !important;
  border-radius: 4px !important;
  width: 18px !important;
  height: 18px !important;
}
[class*="termly-styles-module-checked-"] {
  background: #E6B450 !important;
  border-color: #E6B450 !important;
}
[class*="termly-styles-module-checked-"] svg,
[class*="termly-styles-module-checked-"] path {
  color: #1F1F1F !important;
  fill: #1F1F1F !important;
  stroke: #1F1F1F !important;
}

/* ---------- Icons ---------- gold accent */
[class*="termly-styles-icon-"] {
  color: #E6B450 !important;
  fill: #E6B450 !important;
}

/* ---------- Disabled state ---------- */
[class*="termly-styles-module-disabled-"] {
  opacity: 0.45 !important;
  cursor: not-allowed !important;
}

/* ---------- Floating preferences button (persistent post-consent icon) ---------- */
.floating-preferences-button,
[class*="floating-preferences-button"] {
  background: #FAF7F2 !important;
  color: #1F1F1F !important;
  border: 2px solid #E6B450 !important;
  border-radius: 999px !important;
  box-shadow: 0 4px 16px rgba(31, 31, 31, 0.15) !important;
  width: 44px !important;
  height: 44px !important;
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  transition: all .2s ease !important;
}
.floating-preferences-button:hover,
[class*="floating-preferences-button"]:hover {
  background: #E6B450 !important;
  color: #1F1F1F !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 8px 24px rgba(230, 180, 80, 0.35) !important;
}

/* ---------- Entry animation — gentle slide-up ---------- */
@keyframes mz-banner-enter {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
[class*="termly-styles-module-shadowBox-"] {
  animation: mz-banner-enter 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
}

/* ---------- Preference modal table — compact ---------- */
[class*="termly-styles-module-content-"] table {
  border-color: rgba(230, 180, 80, 0.25) !important;
  border-collapse: separate !important;
  border-spacing: 0 !important;
  font-size: 0.85rem !important;
}
[class*="termly-styles-module-content-"] th,
[class*="termly-styles-module-content-"] td {
  color: #1F1F1F !important;
  border-color: rgba(230, 180, 80, 0.2) !important;
  background: transparent !important;
  padding: 10px 8px !important;
}
[class*="termly-styles-module-content-"] th {
  font-weight: 600 !important;
  color: #5F5A56 !important;
  text-transform: uppercase !important;
  font-size: 0.7rem !important;
  letter-spacing: 0.05em !important;
}

    </style>

      <style>html, body { overflow-x: hidden; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
