    <!-- ============================================================ -->
    <!-- B13 - Termly CMP. autoBlock=on prevents Meta/GA4/TikTok       -->
    <!-- pixels from firing before consent is given.                  -->
    <!--                                                              -->
    <!-- Bundle Z (2026-06-15) — added async attribute so the Termly  -->
    <!-- resource-blocker downloads in parallel with HTML parsing      -->
    <!-- instead of blocking it. autoBlock=on patches                  -->
    <!-- document.createElement / appendChild proxies once the script  -->
    <!-- runs; in our app no marketing pixels are injected from        -->
    <!-- index.html (they're added post-hydration by the React tree),  -->
    <!-- so the small async-execution gap does not race the first      -->
    <!-- pixel injection. NOTE: do not add `defer` here — Termly's     -->
    <!-- docs recommend ASAP execution, defer pushes execution to      -->
    <!-- after DOMContentLoaded which widens the at-risk window if     -->
    <!-- any pixel is ever inlined into index.html in the future.      -->
    <!-- ============================================================ -->
    <script async src="https://app.termly.io/resource-blocker/04874b92-554a-4fee-9d8f-2becf5ed2d06?autoBlock=on"></script>

    <!-- ============================================================ -->
    <!-- Termly banner brand-color injector (2026-06-23, follow-up)    -->
    <!-- Termly's modern CMP renders in Shadow DOM — external <style> -->
    <!-- in <head> can't pierce the boundary, so we walk shadow roots  -->
    <!-- and append the brand CSS INSIDE each one Termly creates.       -->
    <!-- ============================================================ -->
    <script>
/* Marryzen — Termly banner shadow-DOM brand-color injector (2026-06-23)
 *
 * Termly's modern CMP renders the cookie banner inside a Shadow DOM
 * (typically <termly-consent-banner> or similar custom elements). CSS in the
 * host document cannot reach inside a shadow root — that's CSS isolation
 * by design. To brand the banner without using Termly's dashboard Custom
 * Theme picker (which our team keeps regressing), we inject our brand
 * stylesheet directly INTO each shadow root Termly creates.
 *
 * Approach:
 *   1. Run after Termly's resource-blocker has loaded (placed late in <head>)
 *   2. MutationObserver watches body for added nodes
 *   3. When any element with .shadowRoot AND a Termly tag-name appears,
 *      we append our <style> to its shadowRoot
 *   4. Same logic re-runs if the user re-opens the preferences modal
 *      (Termly mounts a NEW shadow root for that, not reuses the banner one)
 *
 * Brand palette: dark #1F1F1F, cream #FAF7F2, gold #E6B450.
 */
(function () {
  if (typeof window === 'undefined' || typeof document === 'undefined') return;

  var BRAND_CSS = [
    /* root surface */
    ':host, :host(*) { font-family: inherit; }',
    'div, section, aside, dialog { background-color: #1F1F1F !important; color: #FAF7F2 !important; border-color: #E6B450 !important; border-radius: 12px !important; }',
    'p, h1, h2, h3, h4, h5, h6, li, span, label { color: #FAF7F2 !important; }',
    'a { color: #E6B450 !important; text-decoration: underline !important; }',
    'a:hover { color: #FAF7F2 !important; }',

    /* primary CTA (Accept) — gold pill */
    'button { font-family: inherit !important; border-radius: 8px !important; padding: 10px 20px !important; font-weight: 500 !important; transition: all .15s ease !important; }',
    'button[class*="accept" i], button[class*="primary" i], button[aria-label*="accept" i], button[data-action*="accept" i] {',
    '  background-color: #E6B450 !important;',
    '  color: #1F1F1F !important;',
    '  border: 1px solid #E6B450 !important;',
    '  font-weight: 600 !important;',
    '}',
    'button[class*="accept" i]:hover, button[class*="primary" i]:hover, button[aria-label*="accept" i]:hover {',
    '  background-color: #D0A23D !important;',
    '  border-color: #D0A23D !important;',
    '}',

    /* secondary CTAs (Decline / Preferences) — outlined cream */
    'button[class*="decline" i], button[class*="reject" i], button[class*="secondary" i], button[class*="preferences" i], button[aria-label*="decline" i], button[aria-label*="reject" i], button[aria-label*="preferences" i] {',
    '  background-color: transparent !important;',
    '  color: #FAF7F2 !important;',
    '  border: 1px solid #FAF7F2 !important;',
    '}',
    'button[class*="decline" i]:hover, button[class*="reject" i]:hover, button[class*="preferences" i]:hover {',
    '  background-color: rgba(230, 180, 80, 0.12) !important;',
    '  border-color: #E6B450 !important;',
    '  color: #E6B450 !important;',
    '}',

    /* close X button */
    'button[aria-label*="close" i] { color: #FAF7F2 !important; background: transparent !important; border: none !important; padding: 4px !important; }',
    'button[aria-label*="close" i]:hover { color: #E6B450 !important; }',

    /* preference modal — table rows + toggle switches */
    'table { border-color: rgba(230, 180, 80, 0.3) !important; }',
    'th, td { color: #FAF7F2 !important; border-color: rgba(230, 180, 80, 0.3) !important; background-color: transparent !important; }',
    '[role="switch"][aria-checked="true"], input[type="checkbox"]:checked + * { background-color: #E6B450 !important; }',
  ].join('\n');

  function injectInto(shadowRoot) {
    if (!shadowRoot || shadowRoot._mzBranded) return;
    try {
      var style = document.createElement('style');
      style.setAttribute('data-mz-brand', '1');
      style.textContent = BRAND_CSS;
      shadowRoot.appendChild(style);
      shadowRoot._mzBranded = true;
    } catch (_) { /* shadow may be 'closed' — fail silently */ }
  }

  function isTermlyHost(el) {
    if (!el || !el.shadowRoot) return false;
    var tag = (el.tagName || '').toLowerCase();
    var id = (el.id || '').toLowerCase();
    var cls = (el.className && el.className.toString ? el.className.toString() : '').toLowerCase();
    if (tag.indexOf('termly') > -1) return true;
    if (id.indexOf('termly') > -1) return true;
    if (cls.indexOf('termly') > -1) return true;
    // Fallback: inspect shadow content for Termly markers
    try {
      var text = (el.shadowRoot.textContent || '').toLowerCase();
      if (text.indexOf('cookie policy') > -1 || text.indexOf('use essential cookies') > -1) return true;
      var html = el.shadowRoot.innerHTML || '';
      if (html.indexOf('termly') > -1) return true;
    } catch (_) {}
    return false;
  }

  function scanAndInject(root) {
    root = root || document;
    var all = root.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      if (all[i].shadowRoot && isTermlyHost(all[i])) {
        injectInto(all[i].shadowRoot);
      }
    }
  }

  /* Initial scan on a delay so Termly script has time to load */
  setTimeout(function () { scanAndInject(); }, 500);
  setTimeout(function () { scanAndInject(); }, 1500);
  setTimeout(function () { scanAndInject(); }, 3500);

  /* Observe for new shadow hosts added later (e.g. preferences modal opens) */
  var observer = new MutationObserver(function (mutations) {
    for (var m = 0; m < mutations.length; m++) {
      var added = mutations[m].addedNodes;
      for (var n = 0; n < added.length; n++) {
        var node = added[n];
        if (node.nodeType !== 1) continue;
        if (node.shadowRoot && isTermlyHost(node)) injectInto(node.shadowRoot);
        if (node.querySelectorAll) {
          var hosts = node.querySelectorAll('*');
          for (var k = 0; k < hosts.length; k++) {
            if (hosts[k].shadowRoot && isTermlyHost(hosts[k])) injectInto(hosts[k].shadowRoot);
          }
        }
      }
    }
  });
  if (document.body) {
    observer.observe(document.body, { childList: true, subtree: true });
  } else {
    document.addEventListener('DOMContentLoaded', function () {
      observer.observe(document.body, { childList: true, subtree: true });
    });
  }
})();

    </script>

    <!-- PWA — Add to Home Screen capability (2026-06-23)              -->
    <!-- Manifest: full app metadata (name, icons, theme, start_url).  -->
    <!-- Apple meta tags: iOS Safari ignores manifest for some props,  -->
    <!-- needs these legacy meta names to render correctly when a user -->
    <!-- adds Marryzen to the iOS home screen.                         -->

    <link rel="manifest" href="/manifest.json" />
    <meta name="application-name" content="Marryzen" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Marryzen" />

    <!-- Favicon + iOS home screen icon. apple-touch-icon.png is the   -->
    <!-- PWA-spec PNG that iOS picks up; the SVG favicon stays for     -->
    <!-- modern browsers that prefer vector.                           -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Built into index.html so the styling is version-controlled in -->

    <!-- Brand palette: dark #1F1F1F, cream #FAF7F2, gold #E6B450.     -->
    <!-- ============================================================ -->
    <style>
/* ============================================================
 * Termly cookie banner — Marryzen brand override (2026-06-23)
 * Built into index.html so the styling is version-controlled
 * in git and survives Termly UI regressions / dashboard resets.
 * Brand palette: dark #1F1F1F, cream #FAF7F2, gold #E6B450.
 * ============================================================ */

/* Banner root + modal — multi-namespace coverage for Termly's
   modern + legacy class systems */
.t-banner,
.t-modal,
.t-preferenceModalDialog,
#termly-code-snippet-support,
[id^="termly-"][role="dialog"],
[class*="termly-cmp"]:not([class*="link"]),
body > div[data-termly] {
  background-color: #1F1F1F !important;
  color: #FAF7F2 !important;
  font-family: inherit !important;
  border-color: #E6B450 !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35) !important;
}

/* Headings + body text inside banner */
.t-banner h1, .t-banner h2, .t-banner h3, .t-banner h4, .t-banner p, .t-banner li, .t-banner span:not(.t-icon),
.t-modal h1, .t-modal h2, .t-modal h3, .t-modal h4, .t-modal p, .t-modal li, .t-modal span:not(.t-icon),
.t-preferenceModalDialog h1, .t-preferenceModalDialog h2, .t-preferenceModalDialog h3, .t-preferenceModalDialog p, .t-preferenceModalDialog li,
[class*="termly-cmp"] h1, [class*="termly-cmp"] h2, [class*="termly-cmp"] h3, [class*="termly-cmp"] p, [class*="termly-cmp"] li {
  color: #FAF7F2 !important;
}

/* Links inside banner — gold */
.t-banner a, .t-modal a, .t-preferenceModalDialog a, [class*="termly-cmp"] a {
  color: #E6B450 !important;
  text-decoration: underline !important;
}
.t-banner a:hover, .t-modal a:hover, .t-preferenceModalDialog a:hover, [class*="termly-cmp"] a:hover {
  color: #FAF7F2 !important;
}

/* Primary CTA (Accept All) — gold pill, dark text */
.t-banner button[class*="accept"],
.t-banner button[class*="primary"],
.t-modal button[class*="accept"],
.t-preferenceModalDialog button[class*="accept"],
.t-preferenceModalDialog button[class*="save"],
[class*="termly-cmp"] button[class*="accept"],
[class*="termly-cmp"] button[class*="save"] {
  background-color: #E6B450 !important;
  color: #1F1F1F !important;
  border: 1px solid #E6B450 !important;
  font-weight: 600 !important;
  border-radius: 8px !important;
  padding: 10px 20px !important;
}
.t-banner button[class*="accept"]:hover,
.t-modal button[class*="accept"]:hover,
[class*="termly-cmp"] button[class*="accept"]:hover,
[class*="termly-cmp"] button[class*="save"]:hover {
  background-color: #D0A23D !important;
  border-color: #D0A23D !important;
  color: #1F1F1F !important;
}

/* Secondary CTAs (Decline All / Preferences) — outlined cream */
.t-banner button[class*="decline"],
.t-banner button[class*="secondary"],
.t-banner button[class*="preferences"],
.t-banner button[class*="reject"],
.t-modal button[class*="decline"],
.t-modal button[class*="secondary"],
.t-modal button[class*="preferences"],
.t-modal button[class*="reject"],
.t-preferenceModalDialog button[class*="decline"],
.t-preferenceModalDialog button[class*="cancel"],
[class*="termly-cmp"] button[class*="decline"],
[class*="termly-cmp"] button[class*="reject"],
[class*="termly-cmp"] button[class*="preferences"] {
  background-color: transparent !important;
  color: #FAF7F2 !important;
  border: 1px solid #FAF7F2 !important;
  font-weight: 500 !important;
  border-radius: 8px !important;
  padding: 10px 20px !important;
}
.t-banner button[class*="decline"]:hover,
.t-banner button[class*="preferences"]:hover,
[class*="termly-cmp"] button[class*="decline"]:hover,
[class*="termly-cmp"] button[class*="preferences"]:hover {
  background-color: rgba(230, 180, 80, 0.12) !important;
  border-color: #E6B450 !important;
  color: #E6B450 !important;
}

/* Modal/overlay backdrop */
.t-overlay,
.termly-cmp-overlay,
[class*="termly"] [class*="overlay"] {
  background-color: rgba(31, 31, 31, 0.78) !important;
  backdrop-filter: blur(2px) !important;
}

/* Preference modal — category rows */
.t-preferenceModalDialog table,
[class*="termly-cmp"] table {
  border-color: rgba(230, 180, 80, 0.3) !important;
}
.t-preferenceModalDialog th,
.t-preferenceModalDialog td,
[class*="termly-cmp"] th,
[class*="termly-cmp"] td {
  color: #FAF7F2 !important;
  border-color: rgba(230, 180, 80, 0.3) !important;
}

/* Toggle switches inside preferences */
.t-preferenceModalDialog [role="switch"][aria-checked="true"],
[class*="termly-cmp"] [role="switch"][aria-checked="true"] {
  background-color: #E6B450 !important;
}

/* Close (X) button */
.t-banner button[aria-label*="close" i],
.t-modal button[aria-label*="close" i],
.t-preferenceModalDialog button[aria-label*="close" i],
[class*="termly-cmp"] button[aria-label*="close" i] {
  color: #FAF7F2 !important;
}
.t-banner button[aria-label*="close" i]:hover {
  color: #E6B450 !important;
}

    </style>
